<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Car Tracker</title>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  set
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

  apiKey: "AIzaSyC62a1FpZHkr6SkDpvuHr64NMEPuVVns3c",

  authDomain:
  "real-time-location-data.firebaseapp.com",

  databaseURL:
  "https://real-time-location-data-default-rtdb.asia-southeast1.firebasedatabase.app",

  projectId:
  "real-time-location-data",

  storageBucket:
  "real-time-location-data.firebasestorage.app",

  messagingSenderId:
  "1072338359237",

  appId:
  "1:1072338359237:web:16c958dcf17cff49f331ac"

};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

let trackingInterval = null;


function sendLocation() {

  navigator.geolocation.getCurrentPosition(

    (position) => {

      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      let speed = position.coords.speed;

      if(speed == null){
        speed = 0;
      }

      speed = speed * 3.6;

      speed = speed.toFixed(1);

      let driveStatus = "停車中";

      if(speed >= 5 && speed < 30){
        driveStatus = "低速移動";
      }

      if(speed >= 30){
        driveStatus = "走行中";
      }


      document.getElementById("status").innerHTML =

        "共有中<br><br>" +

        "状態: " + driveStatus +

        "<br><br>速度: " + speed + " km/h" +

        "<br><br>LAT: " + lat +

        "<br>LON: " + lon;


      set(ref(db, 'car/location'), {

        lat: lat,
        lon: lon,
        speed: speed,
        status: driveStatus,
        time: Date.now(),
        active: true

      });

    },

    (error) => {

      document.getElementById("status").innerHTML =
      "GPS ERROR";

    },

    {
      enableHighAccuracy: true
    }

  );

}


function startTracking() {

  if(trackingInterval == null){

    sendLocation();

    trackingInterval = setInterval(sendLocation, 10000);

    document.getElementById("mode").innerHTML =
    "TRACKING START";

  }

}


function stopTracking() {

  clearInterval(trackingInterval);

  trackingInterval = null;

  document.getElementById("mode").innerHTML =
  "TRACKING STOP";

  set(ref(db, 'car/location/active'), false);

}


window.startTracking = startTracking;
window.stopTracking = stopTracking;

</script>

</head>

<body>

<h1>Car Tracker</h1>

<h2 id="mode">

STOPPED

</h2>

<button onclick="startTracking()">

共有開始

</button>

<br><br>

<button onclick="stopTracking()">

共有停止

</button>

<p id="status">

待機中...

</p>

</body>
</html>
