<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Car Location Viewer</title>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

  apiKey: "AIzaSyC62a1FpZHkr6SkDpvuHr64NMEPuVVns3c",

  authDomain:
  "real-time-location-data.firebaseapp.com",

  databaseURL:
  "https://real-time-location-data-default-rtdb.asia-southeast1.firebasedatabase.app",

  projectId:
  "real-time-location-data",

  storageBucket:
  "real-time-location-data.firebasestorage.app",

  messagingSenderId:
  "1072338359237",

  appId:
  "1:1072338359237:web:16c958dcf17cff49f331ac"

};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const locationRef = ref(db, 'car/location');


onValue(locationRef, (snapshot) => {

  const data = snapshot.val();

  if(data){

    const lat = data.lat;
    const lon = data.lon;

    document.getElementById("status").innerHTML =

      "LAT: " + lat +
      "<br>LON: " + lon;

    const mapURL =
      "https://maps.google.com/?q=" +
      lat + "," + lon;

    document.getElementById("mapLink").href =
      mapURL;

  }

});

</script>

</head>

<body>

<h1>Car Location</h1>

<p id="status">

Waiting...

</p>

<a id="mapLink" target="_blank">

<button>

GoogleMapを開く

</button>

</a>

</body>
</html>
